<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)" rx="12"/>

  <!-- Header -->
  <rect x="20" y="20" width="560" height="50" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="45" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">📊 Analytics Dashboard</text>

  <!-- Chart Area -->
  <rect x="20" y="90" width="360" height="280" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Participation Analysis</text>

  <!-- Bar Chart -->
  <rect x="60" y="140" width="40" height="80" fill="url(#barGradient)" rx="4"/>
  <rect x="120" y="160" width="40" height="60" fill="#10b981" rx="4"/>
  <rect x="180" y="150" width="40" height="70" fill="#f59e0b" rx="4"/>
  <rect x="240" y="170" width="40" height="50" fill="#ef4444" rx="4"/>
  <rect x="300" y="130" width="40" height="90" fill="#8b5cf6" rx="4"/>

  <!-- Labels -->
  <text x="75" y="240" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Know</text>
  <text x="135" y="240" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">WTK</text>
  <text x="195" y="240" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Learned</text>
  <text x="255" y="240" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Quiz</text>
  <text x="315" y="240" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Reflect</text>

  <!-- Stats Cards -->
  <rect x="400" y="90" width="180" height="60" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="110" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Total Students</text>
  <text x="420" y="130" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">127</text>

  <rect x="400" y="160" width="180" height="60" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="180" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Completion Rate</text>
  <text x="420" y="200" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#10b981">89%</text>

  <rect x="400" y="230" width="180" height="60" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="250" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Avg Score</text>
  <text x="420" y="270" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#3b82f6">8.5</text>

  <!-- Progress indicators -->
  <circle cx="50" cy="330" r="8" fill="#10b981"/>
  <text x="70" y="335" font-family="Arial, sans-serif" font-size="12" fill="#374151">Real-time updates</text>

  <circle cx="200" cy="330" r="8" fill="#3b82f6"/>
  <text x="220" y="335" font-family="Arial, sans-serif" font-size="12" fill="#374151">Live monitoring</text>

  <circle cx="350" cy="330" r="8" fill="#f59e0b"/>
  <text x="370" y="335" font-family="Arial, sans-serif" font-size="12" fill="#374151">Data export</text>
</svg>