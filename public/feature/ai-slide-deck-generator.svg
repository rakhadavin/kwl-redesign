<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#fdf2f8"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="gradSlide1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradSlide2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main Container -->
  <rect x="80" y="50" width="640" height="500" rx="20" fill="white" stroke="#fce7f3" stroke-width="3"/>

  <!-- Header -->
  <rect x="80" y="50" width="640" height="60" rx="20" fill="url(#gradSlide1)"/>
  <text x="400" y="90" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">📊 AI Slide Deck Generator</text>

  <!-- Slide Preview -->
  <rect x="110" y="130" width="280" height="180" rx="12" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="110" y="130" width="280" height="40" rx="12" fill="url(#gradSlide2)"/>
  <text x="250" y="157" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">KWL Method Overview</text>

  <!-- Slide content -->
  <circle cx="135" cy="195" r="8" fill="#ec4899"/>
  <text x="150" y="200" font-family="Arial, sans-serif" font-size="12" fill="#6b21a8">Know - Prior Knowledge</text>

  <circle cx="135" cy="225" r="8" fill="#f59e0b"/>
  <text x="150" y="230" font-family="Arial, sans-serif" font-size="12" fill="#6b21a8">Want - Learning Goals</text>

  <circle cx="135" cy="255" r="8" fill="#10b981"/>
  <text x="150" y="260" font-family="Arial, sans-serif" font-size="12" fill="#6b21a8">Learned - Reflections</text>

  <!-- Visual element in slide -->
  <rect x="230" y="190" width="140" height="100" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="300" y="225" font-family="Arial, sans-serif" font-size="10" fill="#9f1239" text-anchor="middle">📈 Chart</text>
  <text x="300" y="240" font-family="Arial, sans-serif" font-size="10" fill="#9f1239" text-anchor="middle">Visual</text>
  <text x="300" y="255" font-family="Arial, sans-serif" font-size="10" fill="#9f1239" text-anchor="middle">Element</text>

  <!-- Slide 2 Preview -->
  <rect x="110" y="330" width="280" height="180" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="110" y="330" width="280" height="40" rx="12" fill="#3b82f6"/>
  <text x="250" y="357" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Pemantik Questions</text>

  <!-- Questions content -->
  <text x="125" y="390" font-family="Arial, sans-serif" font-size="11" fill="#1e3a8a" font-weight="bold">💡 Pertanyaan Pemantik:</text>
  <text x="125" y="410" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">1. Apa yang sudah kamu ketahui</text>
  <text x="135" y="425" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">tentang topik ini?</text>

  <text x="125" y="450" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">2. Apa yang ingin kamu pelajari</text>
  <text x="135" y="465" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">lebih lanjut?</text>

  <text x="125" y="490" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">3. Bagaimana kamu akan</text>
  <text x="135" y="505" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">menerapkannya?</text>

  <!-- Generation Panel -->
  <rect x="410" y="130" width="290" height="380" rx="12" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="420" y="155" font-family="Arial, sans-serif" font-size="14" fill="#047857" font-weight="bold">🤖 AI Generation Panel</text>

  <!-- Input section -->
  <rect x="425" y="170" width="260" height="80" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="435" y="188" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" font-weight="bold">Topic Input:</text>
  <text x="435" y="205" font-family="Arial, sans-serif" font-size="10" fill="#64748b">"Metode KWL dalam Pembelajaran"</text>

  <text x="435" y="228" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" font-weight="bold">Level:</text>
  <rect x="475" y="215" width="80" height="22" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="515" y="230" font-family="Arial, sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">University</text>

  <text x="565" y="228" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" font-weight="bold">Slides:</text>
  <rect x="615" y="215" width="60" height="22" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="645" y="230" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">10</text>

  <!-- Generated features -->
  <rect x="425" y="265" width="260" height="60" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="435" y="283" font-family="Arial, sans-serif" font-size="11" fill="#9f1239" font-weight="bold">✓ Auto-generated:</text>
  <text x="445" y="300" font-family="Arial, sans-serif" font-size="10" fill="#9f1239">• KWL-aligned structure</text>
  <text x="445" y="315" font-family="Arial, sans-serif" font-size="10" fill="#9f1239">• Visual elements & charts</text>

  <rect x="425" y="335" width="260" height="60" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="445" y="357" font-family="Arial, sans-serif" font-size="10" fill="#6b21a8">• Pemantik questions</text>
  <text x="445" y="372" font-family="Arial, sans-serif" font-size="10" fill="#6b21a8">• Case studies & examples</text>
  <text x="445" y="387" font-family="Arial, sans-serif" font-size="10" fill="#6b21a8">• Reflection prompts</text>

  <!-- Action button -->
  <rect x="425" y="410" width="260" height="45" rx="10" fill="url(#gradSlide1)"/>
  <text x="555" y="438" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">🚀 Generate Slide Deck</text>

  <!-- Stats -->
  <rect x="425" y="470" width="125" height="30" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="487" y="490" font-family="Arial, sans-serif" font-size="10" fill="#047857" text-anchor="middle" font-weight="bold">⚡ 15 seconds</text>

  <rect x="560" y="470" width="125" height="30" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="622" y="490" font-family="Arial, sans-serif" font-size="10" fill="#1e40af" text-anchor="middle" font-weight="bold">📄 Ready to use</text>

  <!-- Decorative elements -->
  <path d="M 705 140 L 715 150 L 725 140 L 730 150 L 735 140" stroke="#ec4899" stroke-width="2" fill="none" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </path>
</svg>
