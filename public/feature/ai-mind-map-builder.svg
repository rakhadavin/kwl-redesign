  <line x1="350" y1="340" x2="250" y2="450" stroke="#f59e0b" stroke-width="3"/>
  <line x1="450" y1="340" x2="550" y2="450" stroke="#10b981" stroke-width="3"/>
  <line x1="400" y1="245" x2="400" y2="150" stroke="#6366f1" stroke-width="3"/>

