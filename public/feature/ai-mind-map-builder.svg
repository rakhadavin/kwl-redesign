  <text x="400" y="80" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">🧠 AI Mind-Map Builder</text>

  <!-- Central Node -->
  <ellipse cx="400" cy="300" rx="90" ry="55" fill="url(#gradMap2)" stroke="#6b21a8" stroke-width="3">
    <animate attributeName="rx" values="90;92;90" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="55;57;55" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <text x="400" y="295" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Learning</text>
  <text x="400" y="312" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Strategies</text>

