  <circle cx="350" cy="340" r="4" fill="#f59e0b"/>
  <circle cx="450" cy="340" r="4" fill="#10b981"/>
  <circle cx="400" cy="245" r="4" fill="#6366f1"/>

  <!-- Instruction text -->
  <rect x="260" y="120" width="280" height="50" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1" opacity="0.95"/>
  <text x="400" y="140" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle" font-weight="bold">💡 Auto-generated from topic:</text>
  <text x="400" y="156" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">"Metode KWL & Learning Strategies"</text>
