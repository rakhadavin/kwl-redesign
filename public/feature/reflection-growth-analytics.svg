<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0fdf4"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="gradGrowth1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradGrowth2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradGrowth3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main Container -->
  <rect x="60" y="40" width="680" height="520" rx="20" fill="white" stroke="#d1fae5" stroke-width="3"/>

  <!-- Header -->
  <rect x="60" y="40" width="680" height="60" rx="20" fill="url(#gradGrowth1)"/>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">📈 Reflection & Growth Analytics</text>

  <!-- Growth Score Card -->
  <rect x="90" y="120" width="200" height="130" rx="12" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <text x="190" y="145" font-family="Arial, sans-serif" font-size="14" fill="#047857" text-anchor="middle" font-weight="bold">🎯 Growth Score</text>

  <!-- Circular progress -->
  <circle cx="190" cy="195" r="35" fill="none" stroke="#d1fae5" stroke-width="8"/>
  <circle cx="190" cy="195" r="35" fill="none" stroke="url(#gradGrowth1)" stroke-width="8" stroke-dasharray="175 220" stroke-linecap="round" transform="rotate(-90 190 195)">
    <animate attributeName="stroke-dasharray" from="0 220" to="175 220" dur="2s" fill="freeze"/>
  </circle>
  <text x="190" y="203" font-family="Arial, sans-serif" font-size="24" fill="#047857" text-anchor="middle" font-weight="bold">79%</text>

  <text x="190" y="238" font-family="Arial, sans-serif" font-size="10" fill="#065f46" text-anchor="middle">Week 1 → Week 8</text>

  <!-- Reflection Depth Indicator -->
  <rect x="310" y="120" width="200" height="130" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="145" font-family="Arial, sans-serif" font-size="14" fill="#1e40af" text-anchor="middle" font-weight="bold">🧠 Reflection Depth</text>

  <!-- Bar indicators -->
  <text x="330" y="170" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">Metacognitive</text>
  <rect x="330" y="175" width="150" height="12" rx="6" fill="#e0e7ff"/>
  <rect x="330" y="175" width="130" height="12" rx="6" fill="url(#gradGrowth3)"/>
  <text x="490" y="185" font-family="Arial, sans-serif" font-size="9" fill="#4f46e5" font-weight="bold">87%</text>

  <text x="330" y="203" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">Critical</text>
  <rect x="330" y="208" width="150" height="12" rx="6" fill="#e0e7ff"/>
  <rect x="330" y="208" width="105" height="12" rx="6" fill="url(#gradGrowth3)"/>
  <text x="490" y="218" font-family="Arial, sans-serif" font-size="9" fill="#4f46e5" font-weight="bold">70%</text>

  <text x="330" y="236" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">Self-awareness</text>
  <rect x="330" y="241" width="150" height="12" rx="6" fill="#e0e7ff"/>
  <rect x="330" y="241" width="120" height="12" rx="6" fill="url(#gradGrowth3)"/>
  <text x="490" y="251" font-family="Arial, sans-serif" font-size="9" fill="#4f46e5" font-weight="bold">80%</text>

  <!-- Weekly Progression -->
  <rect x="530" y="120" width="190" height="130" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="625" y="145" font-family="Arial, sans-serif" font-size="14" fill="#92400e" text-anchor="middle" font-weight="bold">📅 This Week</text>

  <text x="625" y="175" font-family="Arial, sans-serif" font-size="32" fill="#78350f" text-anchor="middle" font-weight="bold">+12%</text>
  <text x="625" y="198" font-family="Arial, sans-serif" font-size="11" fill="#92400e" text-anchor="middle">vs. Last Week</text>

  <rect x="555" y="210" width="140" height="30" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="625" y="230" font-family="Arial, sans-serif" font-size="10" fill="#047857" text-anchor="middle" font-weight="bold">🚀 Trending Up!</text>

  <!-- Reflection Radar Chart -->
  <rect x="90" y="270" width="310" height="260" rx="12" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="100" y="295" font-family="Arial, sans-serif" font-size="14" fill="#6b21a8" font-weight="bold">🎯 Reflection Radar</text>

  <!-- Radar chart -->
  <g transform="translate(245, 400)">
    <!-- Grid lines -->
    <polygon points="0,-80 70,-40 70,40 0,80 -70,40 -70,-40" fill="none" stroke="#cbd5e1" stroke-width="1" opacity="0.3"/>
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#cbd5e1" stroke-width="1" opacity="0.3"/>
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="none" stroke="#cbd5e1" stroke-width="1" opacity="0.3"/>
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="none" stroke="#cbd5e1" stroke-width="1" opacity="0.3"/>

    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="-80" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="0" y1="0" x2="70" y2="-40" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="0" y1="0" x2="70" y2="40" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="80" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="0" y1="0" x2="-70" y2="40" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="0" y1="0" x2="-70" y2="-40" stroke="#cbd5e1" stroke-width="1"/>

    <!-- Data polygon -->
    <polygon points="0,-65 55,-35 48,35 0,55 -50,28 -60,-35" fill="#ddd6fe" opacity="0.6" stroke="#8b5cf6" stroke-width="2"/>

    <!-- Data points -->
    <circle cx="0" cy="-65" r="4" fill="#8b5cf6"/>
    <circle cx="55" cy="-35" r="4" fill="#8b5cf6"/>
    <circle cx="48" cy="35" r="4" fill="#8b5cf6"/>
    <circle cx="0" cy="55" r="4" fill="#8b5cf6"/>
    <circle cx="-50" cy="28" r="4" fill="#8b5cf6"/>
    <circle cx="-60" cy="-35" r="4" fill="#8b5cf6"/>

    <!-- Labels -->
    <text x="0" y="-90" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8" text-anchor="middle">Clarity</text>
    <text x="80" y="-40" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8">Depth</text>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8">Evidence</text>
    <text x="0" y="70" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8" text-anchor="middle">Growth</text>
    <text x="-85" y="35" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8" text-anchor="end">Critical</text>
    <text x="-85" y="-35" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8" text-anchor="end">Meta</text>
  </g>

  <!-- Concept Shift Map -->
  <rect x="420" y="270" width="300" height="260" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="430" y="295" font-family="Arial, sans-serif" font-size="14" fill="#1e40af" font-weight="bold">🔄 Concept Shift Map (K → W → L)</text>

  <!-- Timeline visualization -->
  <line x1="450" y1="330" x2="690" y2="330" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Know phase -->
  <circle cx="490" cy="330" r="25" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="490" y="327" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d" text-anchor="middle" font-weight="bold">K</text>
  <text x="490" y="340" font-family="Arial, sans-serif" font-size="8" fill="#7f1d1d" text-anchor="middle">Basic</text>
  <text x="490" y="370" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Week 1</text>

  <!-- Want phase -->
  <circle cx="570" cy="330" r="25" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="570" y="327" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle" font-weight="bold">W</text>
  <text x="570" y="340" font-family="Arial, sans-serif" font-size="8" fill="#92400e" text-anchor="middle">Curious</text>
  <text x="570" y="370" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Week 4</text>

  <!-- Learn phase -->
  <circle cx="650" cy="330" r="25" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <text x="650" y="327" font-family="Arial, sans-serif" font-size="10" fill="#065f46" text-anchor="middle" font-weight="bold">L</text>
  <text x="650" y="340" font-family="Arial, sans-serif" font-size="8" fill="#065f46" text-anchor="middle">Mastery</text>
  <text x="650" y="370" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Week 8</text>

  <!-- Concept examples -->
  <rect x="440" y="390" width="260" height="55" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="407" font-family="Arial, sans-serif" font-size="10" fill="#6b21a8" font-weight="bold">Concept Evolution:</text>
  <text x="450" y="423" font-family="Arial, sans-serif" font-size="9" fill="#64748b">"Arrays" → "Dynamic Arrays & Memory"</text>
  <text x="450" y="437" font-family="Arial, sans-serif" font-size="9" fill="#64748b">→ "Efficient Data Manipulation"</text>

  <!-- Personal insights -->
  <rect x="440" y="455" width="260" height="60" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="472" font-family="Arial, sans-serif" font-size="10" fill="#047857" font-weight="bold">✨ Personal Growth Insight:</text>
  <text x="450" y="488" font-family="Arial, sans-serif" font-size="9" fill="#065f46">You've shifted from surface learning</text>
  <text x="450" y="503" font-family="Arial, sans-serif" font-size="9" fill="#065f46">to deeper conceptual understanding!</text>

  <!-- Decorative growth arrow -->
  <path d="M 705 330 L 715 325 L 715 335 Z" fill="#10b981"/>
</svg>
