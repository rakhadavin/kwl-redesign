<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f3ff"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="gradGame1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradGame2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradGame3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="gradGlow">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Game Screen Container -->
  <rect x="100" y="50" width="600" height="500" rx="25" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="4"/>

  <!-- Header Bar -->
  <rect x="100" y="50" width="600" height="60" rx="25" fill="url(#gradGame1)"/>
  <text x="400" y="90" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">🎮 AI Game-Based Learning</text>

  <!-- Score and Level indicators -->
  <rect x="120" y="125" width="120" height="45" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="180" y="143" font-family="Arial, sans-serif" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">⭐ Score</text>
  <text x="180" y="162" font-family="Arial, sans-serif" font-size="18" fill="#92400e" text-anchor="middle" font-weight="bold">2,850</text>

  <rect x="560" y="125" width="120" height="45" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="620" y="143" font-family="Arial, sans-serif" font-size="12" fill="#9f1239" text-anchor="middle" font-weight="bold">🎯 Level</text>
  <text x="620" y="162" font-family="Arial, sans-serif" font-size="18" fill="#9f1239" text-anchor="middle" font-weight="bold">5</text>

  <!-- Game Quest Path -->
  <!-- Quest 1 -->
  <circle cx="200" cy="250" r="40" fill="url(#gradGame2)" stroke="#fff" stroke-width="3">
    <animate attributeName="r" values="40;42;40" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="245" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle">🏆</text>
  <text x="200" y="265" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Quest 1</text>
  <circle cx="220" cy="230" r="8" fill="url(#gradGlow)"/>

  <!-- Quest 2 -->
  <circle cx="350" cy="220" r="40" fill="url(#gradGame1)" stroke="#fff" stroke-width="3"/>
  <text x="350" y="215" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle">🎯</text>
  <text x="350" y="235" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Quest 2</text>

  <!-- Quest 3 (Current) -->
  <circle cx="500" cy="250" r="45" fill="url(#gradGame3)" stroke="#fff" stroke-width="4">
    <animate attributeName="stroke-width" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="500" y="245" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">🎪</text>
  <text x="500" y="265" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Quest 3</text>
  <circle cx="525" cy="230" r="12" fill="url(#gradGlow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Connecting path lines -->
  <line x1="240" y1="250" x2="310" y2="230" stroke="#8b5cf6" stroke-width="4" stroke-dasharray="8,4"/>
  <line x1="390" y1="230" x2="455" y2="245" stroke="#8b5cf6" stroke-width="4" stroke-dasharray="8,4"/>

  <!-- Challenge Card -->
  <rect x="130" y="330" width="540" height="120" rx="15" fill="white" stroke="#8b5cf6" stroke-width="3"/>
  <rect x="130" y="330" width="540" height="40" rx="15" fill="url(#gradGame1)"/>
  <text x="400" y="355" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle" font-weight="bold">🧩 Challenge: Apa yang ingin kamu pelajari tentang KWL?</text>

  <!-- Answer options -->
  <rect x="150" y="385" width="240" height="50" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="270" y="405" font-family="Arial, sans-serif" font-size="12" fill="#6b21a8" text-anchor="middle">A. Cara membuat pertanyaan</text>
  <text x="270" y="422" font-family="Arial, sans-serif" font-size="12" fill="#6b21a8" text-anchor="middle">reflektif yang efektif</text>

  <rect x="410" y="385" width="240" height="50" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="530" y="405" font-family="Arial, sans-serif" font-size="12" fill="#9f1239" text-anchor="middle">B. Teknik analisis hasil</text>
  <text x="530" y="422" font-family="Arial, sans-serif" font-size="12" fill="#9f1239" text-anchor="middle">pembelajaran mahasiswa</text>

  <!-- AI Hint Box -->
  <rect x="130" y="465" width="280" height="65" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="145" y="485" font-family="Arial, sans-serif" font-size="12" fill="#92400e" font-weight="bold">💡 AI Hint:</text>
  <text x="145" y="502" font-family="Arial, sans-serif" font-size="10" fill="#92400e">Pikirkan tentang tahapan yang</text>
  <text x="145" y="517" font-family="Arial, sans-serif" font-size="10" fill="#92400e">paling sering kamu gunakan di KWL!</text>

  <!-- Progress Bar -->
  <rect x="430" y="465" width="240" height="65" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="445" y="485" font-family="Arial, sans-serif" font-size="11" fill="#1e40af" font-weight="bold">📊 Progress Quest 3:</text>
  <rect x="445" y="492" width="210" height="20" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <rect x="445" y="492" width="147" height="20" rx="10" fill="url(#gradGame1)"/>
  <text x="550" y="506" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">70%</text>

  <!-- Decorative stars -->
  <path d="M 160 140 L 165 150 L 175 152 L 167 160 L 169 170 L 160 165 L 151 170 L 153 160 L 145 152 L 155 150 Z" fill="#fbbf24" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 160 155" to="360 160 155" dur="5s" repeatCount="indefinite"/>
  </path>

  <path d="M 640 140 L 645 150 L 655 152 L 647 160 L 649 170 L 640 165 L 631 170 L 633 160 L 625 152 L 635 150 Z" fill="#ec4899" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 640 155" to="360 640 155" dur="4s" repeatCount="indefinite"/>
  </path>
</svg>
