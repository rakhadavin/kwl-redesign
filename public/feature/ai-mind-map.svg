<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0fdf4"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="gradMind1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradMind2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="gradMind3">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.2" />
    </radialGradient>
  </defs>

  <!-- Central Node (Main Topic) -->
  <ellipse cx="400" cy="300" rx="100" ry="60" fill="url(#gradMind1)" stroke="#047857" stroke-width="3"/>
  <text x="400" y="295" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Metode</text>
  <text x="400" y="315" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">KWL</text>

  <!-- Branch Lines -->
  <line x1="300" y1="280" x2="200" y2="180" stroke="#10b981" stroke-width="3"/>
  <line x1="350" y1="250" x2="250" y2="350" stroke="#14b8a6" stroke-width="3"/>
  <line x1="500" y1="280" x2="600" y2="180" stroke="#8b5cf6" stroke-width="3"/>
  <line x1="450" y1="350" x2="550" y2="450" stroke="#ec4899" stroke-width="3"/>
  <line x1="400" y1="240" x2="400" y2="120" stroke="#f59e0b" stroke-width="3"/>

  <!-- Branch Node 1 - KNOW -->
  <ellipse cx="200" cy="180" rx="70" ry="45" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="200" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#047857" text-anchor="middle">KNOW</text>
  <text x="200" y="192" font-family="Arial, sans-serif" font-size="10" fill="#047857" text-anchor="middle">(Pengetahuan</text>
  <text x="200" y="204" font-family="Arial, sans-serif" font-size="10" fill="#047857" text-anchor="middle">Awal)</text>

  <!-- Branch Node 2 - WANT -->
  <ellipse cx="250" cy="350" rx="70" ry="45" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2"/>
  <text x="250" y="345" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f766e" text-anchor="middle">WANT</text>
  <text x="250" y="362" font-family="Arial, sans-serif" font-size="10" fill="#0f766e" text-anchor="middle">(Ingin</text>
  <text x="250" y="374" font-family="Arial, sans-serif" font-size="10" fill="#0f766e" text-anchor="middle">Dipelajari)</text>

  <!-- Branch Node 3 - LEARNED -->
  <ellipse cx="600" cy="180" rx="70" ry="45" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="600" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6b21a8" text-anchor="middle">LEARNED</text>
  <text x="600" y="192" font-family="Arial, sans-serif" font-size="10" fill="#6b21a8" text-anchor="middle">(Telah</text>
  <text x="600" y="204" font-family="Arial, sans-serif" font-size="10" fill="#6b21a8" text-anchor="middle">Dipelajari)</text>

  <!-- Branch Node 4 - REFLEKSI -->
  <ellipse cx="550" cy="450" rx="70" ry="45" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="550" y="447" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9f1239" text-anchor="middle">REFLEKSI</text>
  <text x="550" y="464" font-family="Arial, sans-serif" font-size="10" fill="#9f1239" text-anchor="middle">(Evaluasi)</text>

  <!-- Branch Node 5 - STRATEGI -->
  <ellipse cx="400" cy="120" rx="70" ry="45" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="117" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e" text-anchor="middle">STRATEGI</text>
  <text x="400" y="134" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">(Metode)</text>

  <!-- Sub-nodes -->
  <circle cx="120" cy="140" r="20" fill="#10b981" opacity="0.6"/>
  <text x="120" y="145" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Pre-</text>
  <text x="120" y="155" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">test</text>

  <circle cx="680" cy="140" r="20" fill="#8b5cf6" opacity="0.6"/>
  <text x="680" y="145" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Post-</text>
  <text x="680" y="155" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">test</text>

  <!-- AI Badge -->
  <rect x="650" y="480" width="130" height="50" rx="10" fill="url(#gradMind3)" stroke="#6366f1" stroke-width="2"/>
  <text x="715" y="500" font-family="Arial, sans-serif" font-size="12" fill="#4338ca" text-anchor="middle" font-weight="bold">🤖 AI Generated</text>
  <text x="715" y="518" font-family="Arial, sans-serif" font-size="9" fill="#4338ca" text-anchor="middle">Auto Mind Map</text>

  <!-- Decorative connecting dots -->
  <circle cx="300" cy="280" r="4" fill="#10b981"/>
  <circle cx="350" cy="250" r="4" fill="#14b8a6"/>
  <circle cx="500" cy="280" r="4" fill="#8b5cf6"/>
  <circle cx="450" cy="350" r="4" fill="#ec4899"/>
  <circle cx="400" cy="240" r="4" fill="#f59e0b"/>
</svg>
