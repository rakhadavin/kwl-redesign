<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#faf5ff"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="gradQuestion1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradQuestion2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradQuestion3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main Container -->
  <rect x="60" y="40" width="680" height="520" rx="20" fill="white" stroke="#e9d5ff" stroke-width="3"/>

  <!-- Header -->
  <rect x="60" y="40" width="680" height="60" rx="20" fill="url(#gradQuestion1)"/>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">❓ Question Intelligence Analytics</text>

  <!-- Question Clustering Visualization -->
  <rect x="90" y="120" width="340" height="200" rx="12" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="14" fill="#6b21a8" font-weight="bold">🎯 Question Clusters (Want to Know)</text>

  <!-- Cluster 1 - Large -->
  <circle cx="200" cy="200" r="50" fill="#ddd6fe" opacity="0.8" stroke="#8b5cf6" stroke-width="2">
    <animate attributeName="r" values="50;52;50" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="195" font-family="Arial, sans-serif" font-size="11" fill="#5b21b6" text-anchor="middle" font-weight="bold">Cluster 1</text>
  <text x="200" y="210" font-family="Arial, sans-serif" font-size="9" fill="#5b21b6" text-anchor="middle">Data Structures</text>
  <text x="200" y="223" font-family="Arial, sans-serif" font-size="8" fill="#7c3aed" text-anchor="middle">18 questions</text>

  <!-- Cluster 2 - Medium -->
  <circle cx="320" cy="180" r="40" fill="#fce7f3" opacity="0.8" stroke="#ec4899" stroke-width="2">
    <animate attributeName="r" values="40;42;40" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <text x="320" y="175" font-family="Arial, sans-serif" font-size="11" fill="#9f1239" text-anchor="middle" font-weight="bold">Cluster 2</text>
  <text x="320" y="190" font-family="Arial, sans-serif" font-size="9" fill="#9f1239" text-anchor="middle">Algorithms</text>
  <text x="320" y="203" font-family="Arial, sans-serif" font-size="8" fill="#db2777" text-anchor="middle">12 questions</text>

  <!-- Cluster 3 - Small -->
  <circle cx="300" cy="270" r="30" fill="#ccfbf1" opacity="0.8" stroke="#14b8a6" stroke-width="2">
    <animate attributeName="r" values="30;32;30" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="300" y="267" font-family="Arial, sans-serif" font-size="10" fill="#0f766e" text-anchor="middle" font-weight="bold">Cluster 3</text>
  <text x="300" y="280" font-family="Arial, sans-serif" font-size="8" fill="#0f766e" text-anchor="middle">Time Complexity</text>
  <text x="300" y="291" font-family="Arial, sans-serif" font-size="7" fill="#14b8a6" text-anchor="middle">7 questions</text>

  <!-- Cluster 4 - Small -->
  <circle cx="150" cy="270" r="28" fill="#fef3c7" opacity="0.8" stroke="#f59e0b" stroke-width="2">
    <animate attributeName="r" values="28;30;28" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="150" y="267" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle" font-weight="bold">Cluster 4</text>
  <text x="150" y="280" font-family="Arial, sans-serif" font-size="8" fill="#92400e" text-anchor="middle">Recursion</text>
  <text x="150" y="291" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle">5 questions</text>

  <!-- Top Questions Panel -->
  <rect x="450" y="120" width="270" height="200" rx="12" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="460" y="145" font-family="Arial, sans-serif" font-size="14" fill="#047857" font-weight="bold">🔥 Most Asked Topics</text>

  <!-- Bar chart -->
  <rect x="470" y="160" width="150" height="20" rx="4" fill="url(#gradQuestion1)"/>
  <text x="475" y="175" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">Data Structures</text>
  <text x="630" y="175" font-family="Arial, sans-serif" font-size="10" fill="#6b21a8" font-weight="bold">18</text>

  <rect x="470" y="190" width="120" height="20" rx="4" fill="url(#gradQuestion2)"/>
  <text x="475" y="205" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">Algorithms</text>
  <text x="600" y="205" font-family="Arial, sans-serif" font-size="10" fill="#9f1239" font-weight="bold">12</text>

  <rect x="470" y="220" width="90" height="20" rx="4" fill="url(#gradQuestion3)"/>
  <text x="475" y="235" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">Time Complexity</text>
  <text x="570" y="235" font-family="Arial, sans-serif" font-size="10" fill="#0f766e" font-weight="bold">7</text>

  <rect x="470" y="250" width="70" height="20" rx="4" fill="#fbbf24"/>
  <text x="475" y="265" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">Recursion</text>
  <text x="550" y="265" font-family="Arial, sans-serif" font-size="10" fill="#92400e" font-weight="bold">5</text>

  <text x="585" y="295" font-family="Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Total: 42 questions</text>

  <!-- Bloom's Taxonomy Analysis -->
  <rect x="90" y="340" width="340" height="200" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="100" y="365" font-family="Arial, sans-serif" font-size="14" fill="#1e40af" font-weight="bold">📚 Bloom's Taxonomy Distribution</text>

  <!-- Pyramid visualization -->
  <polygon points="260,390 310,390 300,410 270,410" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="285" y="405" font-family="Arial, sans-serif" font-size="9" fill="#7f1d1d" text-anchor="middle" font-weight="bold">Create (2)</text>

  <polygon points="250,410 320,410 310,435 260,435" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="285" y="427" font-family="Arial, sans-serif" font-size="9" fill="#92400e" text-anchor="middle" font-weight="bold">Evaluate (5)</text>

  <polygon points="240,435 330,435 320,465 250,465" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="285" y="453" font-family="Arial, sans-serif" font-size="9" fill="#1e3a8a" text-anchor="middle" font-weight="bold">Analyze (12)</text>

  <polygon points="230,465 340,465 330,500 240,500" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="285" y="485" font-family="Arial, sans-serif" font-size="9" fill="#065f46" text-anchor="middle" font-weight="bold">Apply (15)</text>

  <polygon points="220,500 350,500 340,520 230,520" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="285" y="513" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8" text-anchor="middle" font-weight="bold">Understand (8)</text>

  <!-- Intervention Recommendations -->
  <rect x="450" y="340" width="270" height="200" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="365" font-family="Arial, sans-serif" font-size="14" fill="#92400e" font-weight="bold">💡 AI Recommendations</text>

  <rect x="460" y="380" width="250" height="55" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="470" y="395" font-family="Arial, sans-serif" font-size="10" fill="#6b21a8" font-weight="bold">📹 Micro-Lecture Needed:</text>
  <text x="470" y="410" font-family="Arial, sans-serif" font-size="9" fill="#64748b">"Advanced Data Structures"</text>
  <text x="470" y="424" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Focus: Trees, Graphs, Hash Tables</text>

  <rect x="460" y="445" width="250" height="55" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="470" y="460" font-family="Arial, sans-serif" font-size="10" fill="#10b981" font-weight="bold">✓ Well Understood:</text>
  <text x="470" y="475" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Basic Sorting Algorithms</text>
  <text x="470" y="489" font-family="Arial, sans-serif" font-size="9" fill="#64748b">No intervention needed</text>

  <rect x="460" y="510" width="250" height="20" rx="5" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="585" y="524" font-family="Arial, sans-serif" font-size="10" fill="#6b21a8" text-anchor="middle" font-weight="bold">View Full Report →</text>
</svg>
