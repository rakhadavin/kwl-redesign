<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#ecfdf5"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="gradLesson1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradLesson2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main Container -->
  <rect x="80" y="40" width="640" height="520" rx="20" fill="white" stroke="#d1fae5" stroke-width="3"/>

  <!-- Header -->
  <rect x="80" y="40" width="640" height="60" rx="20" fill="url(#gradLesson1)"/>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">📘 AI Lesson Plan Generator</text>

  <!-- Lesson Plan Preview -->
  <rect x="110" y="120" width="290" height="400" rx="12" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>

  <!-- LP Header -->
  <rect x="110" y="120" width="290" height="45" rx="12" fill="url(#gradLesson2)"/>
  <text x="255" y="148" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Lesson Plan: Data Structures</text>

  <!-- Learning Objectives -->
  <rect x="125" y="180" width="260" height="75" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="135" y="197" font-family="Arial, sans-serif" font-size="11" fill="#1e40af" font-weight="bold">🎯 Learning Objectives</text>
  <text x="135" y="213" font-family="Arial, sans-serif" font-size="9" fill="#1e3a8a">1. Understand array data structure</text>
  <text x="135" y="227" font-family="Arial, sans-serif" font-size="9" fill="#1e3a8a">2. Apply sorting algorithms</text>
  <text x="135" y="241" font-family="Arial, sans-serif" font-size="9" fill="#1e3a8a">3. Analyze time complexity</text>

  <!-- KWL Integration -->
  <rect x="125" y="265" width="260" height="85" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="135" y="282" font-family="Arial, sans-serif" font-size="11" fill="#92400e" font-weight="bold">📝 KWL Integration</text>
  <text x="135" y="298" font-family="Arial, sans-serif" font-size="9" fill="#78350f">K: Pre-assessment quiz</text>
  <text x="135" y="312" font-family="Arial, sans-serif" font-size="9" fill="#78350f">W: Student-driven questions</text>
  <text x="135" y="326" font-family="Arial, sans-serif" font-size="9" fill="#78350f">L: Reflection & mind-mapping</text>
  <text x="135" y="340" font-family="Arial, sans-serif" font-size="9" fill="#78350f">⏱️ Duration: 90 minutes</text>

  <!-- Activities -->
  <rect x="125" y="360" width="260" height="85" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="135" y="377" font-family="Arial, sans-serif" font-size="11" fill="#6b21a8" font-weight="bold">🎯 Learning Activities</text>
  <text x="135" y="393" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8">• Interactive coding demo (20m)</text>
  <text x="135" y="407" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8">• Pair programming exercise (30m)</text>
  <text x="135" y="421" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8">• Group discussion (15m)</text>
  <text x="135" y="435" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8">• KWL reflection (10m)</text>

  <!-- Assessment -->
  <rect x="125" y="455" width="125" height="50" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="187" y="473" font-family="Arial, sans-serif" font-size="10" fill="#9f1239" text-anchor="middle" font-weight="bold">Assessment</text>
  <text x="187" y="489" font-family="Arial, sans-serif" font-size="8" fill="#9f1239" text-anchor="middle">Quiz + Practice</text>

  <rect x="260" y="455" width="125" height="50" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="322" y="473" font-family="Arial, sans-serif" font-size="10" fill="#065f46" text-anchor="middle" font-weight="bold">Materials</text>
  <text x="322" y="489" font-family="Arial, sans-serif" font-size="8" fill="#065f46" text-anchor="middle">Slides + Code</text>

  <!-- Settings Panel -->
  <rect x="420" y="120" width="280" height="400" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="430" y="145" font-family="Arial, sans-serif" font-size="14" fill="#1e40af" font-weight="bold">⚙️ Plan Settings</text>

  <!-- Target audience -->
  <rect x="435" y="160" width="250" height="60" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="445" y="178" font-family="Arial, sans-serif" font-size="11" fill="#475569" font-weight="bold">Target Audience:</text>
  <rect x="445" y="185" width="110" height="25" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="202" font-family="Arial, sans-serif" font-size="10" fill="#1e40af" text-anchor="middle" font-weight="bold">✓ University</text>
  <rect x="565" y="185" width="110" height="25" rx="5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="620" y="202" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">High School</text>

  <!-- Duration -->
  <rect x="435" y="235" width="120" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="445" y="253" font-family="Arial, sans-serif" font-size="10" fill="#92400e" font-weight="bold">Duration:</text>
  <text x="495" y="275" font-family="Arial, sans-serif" font-size="18" fill="#78350f" text-anchor="middle" font-weight="bold">90 min</text>

  <!-- Complexity -->
  <rect x="565" y="235" width="120" height="55" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="575" y="253" font-family="Arial, sans-serif" font-size="10" fill="#6b21a8" font-weight="bold">Level:</text>
  <text x="625" y="275" font-family="Arial, sans-serif" font-size="14" fill="#6b21a8" text-anchor="middle" font-weight="bold">Intermediate</text>

  <!-- KWL Integration options -->
  <rect x="435" y="305" width="250" height="90" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="445" y="323" font-family="Arial, sans-serif" font-size="11" fill="#065f46" font-weight="bold">✓ KWL Integration:</text>

  <circle cx="450" cy="338" r="5" fill="#10b981"/>
  <text x="462" y="343" font-family="Arial, sans-serif" font-size="9" fill="#047857">Pre-class Know assessment</text>

  <circle cx="450" cy="358" r="5" fill="#10b981"/>
  <text x="462" y="363" font-family="Arial, sans-serif" font-size="9" fill="#047857">Want-driven activities</text>

  <circle cx="450" cy="378" r="5" fill="#10b981"/>
  <text x="462" y="383" font-family="Arial, sans-serif" font-size="9" fill="#047857">Post-class reflection</text>

  <!-- Personalization -->
  <rect x="435" y="410" width="250" height="60" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="445" y="428" font-family="Arial, sans-serif" font-size="11" fill="#9f1239" font-weight="bold">🎯 Personalization:</text>
  <text x="455" y="445" font-family="Arial, sans-serif" font-size="9" fill="#9f1239">• Adapted to student KWL responses</text>
  <text x="455" y="460" font-family="Arial, sans-serif" font-size="9" fill="#9f1239">• Aligned with curriculum goals</text>

  <!-- Generate button -->
  <rect x="435" y="480" width="250" height="40" rx="10" fill="url(#gradLesson1)"/>
  <text x="560" y="505" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">🚀 Generate Lesson Plan</text>

  <!-- Info badges -->
  <rect x="110" y="530" width="130" height="20" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="175" y="544" font-family="Arial, sans-serif" font-size="9" fill="#1e40af" text-anchor="middle" font-weight="bold">📊 Evidence-based</text>

  <rect x="250" y="530" width="150" height="20" rx="5" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="325" y="544" font-family="Arial, sans-serif" font-size="9" fill="#047857" text-anchor="middle" font-weight="bold">✓ Ready in 30 seconds</text>

  <rect x="570" y="530" width="130" height="20" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="635" y="544" font-family="Arial, sans-serif" font-size="9" fill="#9f1239" text-anchor="middle" font-weight="bold">Personal & Adaptive</text>

  <!-- Decorative -->
  <circle cx="710" cy="130" r="5" fill="#10b981" opacity="0.5">
    <animate attributeName="cy" values="130;120;130" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
