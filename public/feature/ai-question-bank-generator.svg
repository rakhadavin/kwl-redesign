<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#eff6ff"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="gradQB1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradQB2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main Container -->
  <rect x="70" y="40" width="660" height="520" rx="20" fill="white" stroke="#bfdbfe" stroke-width="3"/>

  <!-- Header -->
  <rect x="70" y="40" width="660" height="60" rx="20" fill="url(#gradQB1)"/>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">🎓 AI Question Bank Generator</text>

  <!-- Question Types Grid -->
  <rect x="100" y="120" width="300" height="200" rx="12" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="110" y="145" font-family="Arial, sans-serif" font-size="14" fill="#1e40af" font-weight="bold">📚 Question Types</text>

  <!-- MCQ -->
  <rect x="115" y="160" width="130" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="130" y="178" font-family="Arial, sans-serif" font-size="11" fill="#1e3a8a" font-weight="bold">Multiple Choice</text>
  <text x="130" y="195" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">• Auto-generated</text>
  <text x="130" y="208" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">• Distractors</text>

  <!-- Essay -->
  <rect x="255" y="160" width="130" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="270" y="178" font-family="Arial, sans-serif" font-size="11" fill="#92400e" font-weight="bold">Essay</text>
  <text x="270" y="195" font-family="Arial, sans-serif" font-size="9" fill="#92400e">• Open-ended</text>
  <text x="270" y="208" font-family="Arial, sans-serif" font-size="9" fill="#92400e">• Reflective</text>

  <!-- True/False -->
  <rect x="115" y="230" width="130" height="60" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="130" y="248" font-family="Arial, sans-serif" font-size="11" fill="#6b21a8" font-weight="bold">True/False</text>
  <text x="130" y="265" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8">• Quick assess</text>
  <text x="130" y="278" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8">• Concept check</text>

  <!-- Coding Task -->
  <rect x="255" y="230" width="130" height="60" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="270" y="248" font-family="Arial, sans-serif" font-size="11" fill="#065f46" font-weight="bold">Coding Task</text>
  <text x="270" y="265" font-family="Arial, sans-serif" font-size="9" fill="#065f46">• Practical</text>
  <text x="270" y="278" font-family="Arial, sans-serif" font-size="9" fill="#065f46">• Skills-based</text>

  <!-- Bloom's Taxonomy -->
  <rect x="100" y="340" width="300" height="180" rx="12" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="110" y="365" font-family="Arial, sans-serif" font-size="14" fill="#78350f" font-weight="bold">🌸 Bloom's Alignment</text>

  <!-- Bloom pyramid mini -->
  <polygon points="250,385 285,385 280,400 255,400" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="267" y="395" font-family="Arial, sans-serif" font-size="8" fill="#7f1d1d" text-anchor="middle">Create</text>

  <polygon points="245,400 290,400 285,420 250,420" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="267" y="413" font-family="Arial, sans-serif" font-size="8" fill="#92400e" text-anchor="middle">Evaluate</text>

  <polygon points="240,420 295,420 290,445 245,445" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="267" y="435" font-family="Arial, sans-serif" font-size="8" fill="#1e3a8a" text-anchor="middle">Analyze</text>

  <polygon points="235,445 300,445 295,475 240,475" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="267" y="463" font-family="Arial, sans-serif" font-size="8" fill="#065f46" text-anchor="middle">Apply</text>

  <polygon points="230,475 305,475 300,500 235,500" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="267" y="490" font-family="Arial, sans-serif" font-size="8" fill="#6b21a8" text-anchor="middle">Understand</text>

  <!-- Distribution -->
  <rect x="125" y="400" width="100" height="110" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="175" y="418" font-family="Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="bold">Distribution:</text>
  <text x="135" y="437" font-family="Arial, sans-serif" font-size="8" fill="#64748b">Create: 10%</text>
  <text x="135" y="452" font-family="Arial, sans-serif" font-size="8" fill="#64748b">Evaluate: 15%</text>
  <text x="135" y="467" font-family="Arial, sans-serif" font-size="8" fill="#64748b">Analyze: 25%</text>
  <text x="135" y="482" font-family="Arial, sans-serif" font-size="8" fill="#64748b">Apply: 30%</text>
  <text x="135" y="497" font-family="Arial, sans-serif" font-size="8" fill="#64748b">Understand: 20%</text>

  <!-- Generation Panel -->
  <rect x="420" y="120" width="290" height="400" rx="12" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="430" y="145" font-family="Arial, sans-serif" font-size="14" fill="#047857" font-weight="bold">🤖 AI Generation Settings</text>

  <!-- Input topic -->
  <rect x="435" y="160" width="260" height="60" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="445" y="178" font-family="Arial, sans-serif" font-size="11" fill="#475569" font-weight="bold">Topic:</text>
  <text x="445" y="195" font-family="Arial, sans-serif" font-size="10" fill="#64748b">"Data Structures & Algorithms"</text>
  <text x="445" y="210" font-family="Arial, sans-serif" font-size="9" fill="#9ca3af">Based on KWL responses</text>

  <!-- Question quantity -->
  <rect x="435" y="235" width="125" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="445" y="253" font-family="Arial, sans-serif" font-size="10" fill="#1e40af" font-weight="bold">Quantity:</text>
  <text x="497" y="273" font-family="Arial, sans-serif" font-size="20" fill="#1e3a8a" text-anchor="middle" font-weight="bold">50</text>

  <!-- Difficulty -->
  <rect x="570" y="235" width="125" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="580" y="253" font-family="Arial, sans-serif" font-size="10" fill="#92400e" font-weight="bold">Difficulty:</text>
  <text x="632" y="273" font-family="Arial, sans-serif" font-size="14" fill="#78350f" text-anchor="middle" font-weight="bold">Mixed</text>

  <!-- CPMK Alignment -->
  <rect x="435" y="300" width="260" height="70" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="445" y="318" font-family="Arial, sans-serif" font-size="11" fill="#1e40af" font-weight="bold">✓ CPMK Alignment:</text>
  <text x="455" y="335" font-family="Arial, sans-serif" font-size="9" fill="#1e3a8a">• Mapped to learning outcomes</text>
  <text x="455" y="350" font-family="Arial, sans-serif" font-size="9" fill="#1e3a8a">• Quality checked automatically</text>
  <text x="455" y="365" font-family="Arial, sans-serif" font-size="9" fill="#1e3a8a">• Bloom's taxonomy balanced</text>

  <!-- Features list -->
  <rect x="435" y="385" width="260" height="80" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="445" y="403" font-family="Arial, sans-serif" font-size="11" fill="#9f1239" font-weight="bold">🎯 Features:</text>
  <text x="455" y="420" font-family="Arial, sans-serif" font-size="9" fill="#9f1239">✓ Auto-generate from materials</text>
  <text x="455" y="435" font-family="Arial, sans-serif" font-size="9" fill="#9f1239">✓ Answer key included</text>
  <text x="455" y="450" font-family="Arial, sans-serif" font-size="9" fill="#9f1239">✓ Export to multiple formats</text>

  <!-- Generate button -->
  <rect x="435" y="475" width="260" height="40" rx="10" fill="url(#gradQB2)"/>
  <text x="565" y="500" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">🚀 Generate Question Bank</text>

  <!-- Decorative -->
  <circle cx="720" cy="130" r="6" fill="#3b82f6" opacity="0.5">
    <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
