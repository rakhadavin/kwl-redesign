<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#faf5ff"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="gradForum1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradForum2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Forum Container -->
  <rect x="100" y="80" width="600" height="440" rx="20" fill="white" stroke="#e5e7eb" stroke-width="3"/>

  <!-- Header -->
  <rect x="100" y="80" width="600" height="70" rx="20" fill="url(#gradForum1)"/>
  <text x="400" y="125" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">AI Forum Assistant</text>

  <!-- Student Question Bubble (Left) -->
  <rect x="130" y="180" width="320" height="80" rx="15" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="145" cy="195" r="12" fill="#3b82f6"/>
  <text x="145" y="200" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">S</text>
  <text x="170" y="205" font-family="Arial, sans-serif" font-size="13" fill="#1e40af" font-weight="600">Mahasiswa bertanya:</text>
  <text x="170" y="225" font-family="Arial, sans-serif" font-size="12" fill="#1e40af">"Bagaimana cara menerapkan</text>
  <text x="170" y="242" font-family="Arial, sans-serif" font-size="12" fill="#1e40af">metode KWL di kelas?"</text>

  <!-- AI Assistant Response (Right) -->
  <rect x="350" y="290" width="340" height="100" rx="15" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="670" cy="305" r="15" fill="url(#gradForum2)"/>
  <text x="670" y="312" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle">🤖</text>
  <text x="530" y="315" font-family="Arial, sans-serif" font-size="13" fill="#6b21a8" font-weight="600">AI Assistant menjawab:</text>
  <text x="365" y="335" font-family="Arial, sans-serif" font-size="11" fill="#6b21a8">"Berikut langkah penerapan KWL:</text>
  <text x="365" y="352" font-family="Arial, sans-serif" font-size="11" fill="#6b21a8">1. Fase Know - identifikasi pengetahuan</text>
  <text x="365" y="369" font-family="Arial, sans-serif" font-size="11" fill="#6b21a8">2. Fase Want - buat pertanyaan eksplorasi</text>
  <text x="365" y="386" font-family="Arial, sans-serif" font-size="11" fill="#6b21a8">3. Fase Learned - refleksi pembelajaran"</text>

  <!-- Probing Question (Left) -->
  <rect x="130" y="410" width="300" height="60" rx="15" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="145" y="430" font-family="Arial, sans-serif" font-size="12" fill="#92400e" font-weight="600">💡 Probing Question:</text>
  <text x="145" y="448" font-family="Arial, sans-serif" font-size="11" fill="#92400e">"Apa tantangan yang mungkin dihadapi</text>
  <text x="145" y="463" font-family="Arial, sans-serif" font-size="11" fill="#92400e">dalam implementasi fase Know?"</text>

  <!-- Floating AI elements -->
  <circle cx="730" cy="200" r="20" fill="#fbbf24" opacity="0.3">
    <animate attributeName="cy" values="200;190;200" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="350" r="15" fill="#ec4899" opacity="0.3">
    <animate attributeName="cy" values="350;340;350" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Status indicators -->
  <rect x="520" y="175" width="160" height="35" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="600" y="190" font-family="Arial, sans-serif" font-size="11" fill="#047857" text-anchor="middle" font-weight="bold">✓ Thread Aktif</text>
  <text x="600" y="204" font-family="Arial, sans-serif" font-size="9" fill="#047857" text-anchor="middle">5 replies</text>
</svg>
