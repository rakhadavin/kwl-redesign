<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="knowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wtkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="learnedGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc" rx="12"/>

  <!-- Header -->
  <rect x="20" y="20" width="560" height="50" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="45" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">📚 KWL Learning Framework</text>

  <!-- Know Section -->
  <rect x="40" y="90" width="160" height="280" fill="white" rx="12" stroke="#06b6d4" stroke-width="2"/>
  <rect x="40" y="90" width="160" height="40" fill="url(#knowGradient)" rx="12"/>
  <text x="120" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">KNOW</text>

  <text x="60" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">What I Know:</text>

  <rect x="55" y="165" width="130" height="25" fill="#f0f9ff" rx="6" stroke="#bae6fd" stroke-width="1"/>
  <text x="65" y="180" font-family="Arial, sans-serif" font-size="10" fill="#075985">• Python basic syntax</text>

  <rect x="55" y="195" width="130" height="25" fill="#f0f9ff" rx="6" stroke="#bae6fd" stroke-width="1"/>
  <text x="65" y="210" font-family="Arial, sans-serif" font-size="10" fill="#075985">• Variables and data types</text>

  <rect x="55" y="225" width="130" height="25" fill="#f0f9ff" rx="6" stroke="#bae6fd" stroke-width="1"/>
  <text x="65" y="240" font-family="Arial, sans-serif" font-size="10" fill="#075985">• Basic loops (for, while)</text>

  <rect x="55" y="255" width="130" height="25" fill="#f0f9ff" rx="6" stroke="#bae6fd" stroke-width="1"/>
  <text x="65" y="270" font-family="Arial, sans-serif" font-size="10" fill="#075985">• Functions definition</text>

  <!-- Quiz Button -->
  <rect x="65" y="300" width="110" height="30" fill="#06b6d4" rx="6"/>
  <text x="120" y="318" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">📝 Take Quiz</text>

  <circle cx="175" cy="340" r="8" fill="#10b981"/>
  <text x="160" y="355" font-family="Arial, sans-serif" font-size="10" fill="#065f46" text-anchor="middle">Completed</text>

  <!-- Want to Know Section -->
  <rect x="220" y="90" width="160" height="280" fill="white" rx="12" stroke="#ec4899" stroke-width="2"/>
  <rect x="220" y="90" width="160" height="40" fill="url(#wtkGradient)" rx="12"/>
  <text x="300" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">WANT TO KNOW</text>

  <text x="240" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Questions I Have:</text>

  <rect x="235" y="165" width="130" height="25" fill="#fdf2f8" rx="6" stroke="#fbcfe8" stroke-width="1"/>
  <text x="245" y="180" font-family="Arial, sans-serif" font-size="10" fill="#be185d">• How do classes work?</text>

  <rect x="235" y="195" width="130" height="25" fill="#fdf2f8" rx="6" stroke="#fbcfe8" stroke-width="1"/>
  <text x="245" y="210" font-family="Arial, sans-serif" font-size="10" fill="#be185d">• What are decorators?</text>

  <rect x="235" y="225" width="130" height="25" fill="#fdf2f8" rx="6" stroke="#fbcfe8" stroke-width="1"/>
  <text x="245" y="240" font-family="Arial, sans-serif" font-size="10" fill="#be185d">• How to handle errors?</text>

  <rect x="235" y="255" width="130" height="25" fill="#fdf2f8" rx="6" stroke="#fbcfe8" stroke-width="1"/>
  <text x="245" y="270" font-family="Arial, sans-serif" font-size="10" fill="#be185d">• File I/O operations?</text>

  <!-- Reflection Button -->
  <rect x="245" y="300" width="110" height="30" fill="#ec4899" rx="6"/>
  <text x="300" y="318" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">💭 Reflect</text>

  <circle cx="355" cy="340" r="8" fill="#f59e0b"/>
  <text x="340" y="355" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">In Progress</text>

  <!-- Learned Section -->
  <rect x="400" y="90" width="160" height="280" fill="white" rx="12" stroke="#f59e0b" stroke-width="2"/>
  <rect x="400" y="90" width="160" height="40" fill="url(#learnedGradient)" rx="12"/>
  <text x="480" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">LEARNED</text>

  <text x="420" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">What I Learned:</text>

  <rect x="415" y="165" width="130" height="25" fill="#fffbeb" rx="6" stroke="#fed7aa" stroke-width="1"/>
  <text x="425" y="180" font-family="Arial, sans-serif" font-size="10" fill="#92400e">• Object-oriented concepts</text>

  <rect x="415" y="195" width="130" height="25" fill="#fffbeb" rx="6" stroke="#fed7aa" stroke-width="1"/>
  <text x="425" y="210" font-family="Arial, sans-serif" font-size="10" fill="#92400e">• Class inheritance</text>

  <rect x="415" y="225" width="130" height="25" fill="#f3f4f6" rx="6" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="425" y="240" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">• Exception handling</text>

  <rect x="415" y="255" width="130" height="25" fill="#f3f4f6" rx="6" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="425" y="270" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">• Advanced file operations</text>

  <!-- Assessment Button -->
  <rect x="425" y="300" width="110" height="30" fill="#f59e0b" rx="6"/>
  <text x="480" y="318" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">✅ Assess</text>

  <circle cx="535" cy="340" r="8" fill="#6b7280"/>
  <text x="520" y="355" font-family="Arial, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Pending</text>

  <!-- Progress Bar -->
  <rect x="40" y="375" width="520" height="8" fill="#e5e7eb" rx="4"/>
  <rect x="40" y="375" width="260" height="8" fill="#10b981" rx="4"/>
  <text x="300" y="395" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">Progress: 50% Complete</text>

  <!-- Connecting arrows -->
  <polygon points="200,240 210,235 210,245" fill="#9ca3af"/>
  <line x1="200" y1="240" x2="220" y2="240" stroke="#9ca3af" stroke-width="2"/>

  <polygon points="380,240 390,235 390,245" fill="#9ca3af"/>
  <line x1="380" y1="240" x2="400" y2="240" stroke="#9ca3af" stroke-width="2"/>
</svg>