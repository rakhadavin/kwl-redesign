<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)" rx="12"/>

  <!-- Header -->
  <rect x="20" y="20" width="560" height="50" fill="white" rx="8" stroke="#0ea5e9" stroke-width="2"/>
  <text x="40" y="45" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">👥 Active Students (24)</text>
  <text x="480" y="45" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Showing 1-8 of 24</text>

  <!-- Student Cards Grid -->
  <!-- Row 1 -->
  <rect x="40" y="90" width="120" height="120" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="100" cy="125" r="18" fill="#3b82f6"/>
  <text x="100" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">A</text>
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">Ahmad R.</text>
  <rect x="75" y="165" width="50" height="18" fill="#dcfce7" rx="9"/>
  <circle cx="85" cy="174" r="3" fill="#10b981"/>
  <text x="100" y="177" font-family="Arial, sans-serif" font-size="10" fill="#166534" text-anchor="middle">Online</text>
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">2m ago</text>

  <rect x="180" y="90" width="120" height="120" fill="white" rx="12" stroke="#22c55e" stroke-width="2"/>
  <circle cx="240" cy="125" r="18" fill="#ec4899"/>
  <text x="240" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">S</text>
  <text x="240" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">Sari D.</text>
  <rect x="210" y="165" width="60" height="18" fill="#dcfce7" rx="9"/>
  <circle cx="225" cy="174" r="3" fill="#10b981" class="animate-pulse"/>
  <text x="240" y="177" font-family="Arial, sans-serif" font-size="10" fill="#166534" text-anchor="middle">Just Joined!</text>
  <circle cx="285" cy="105" r="8" fill="#22c55e" class="animate-bounce"/>
  <text x="285" y="109" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">New!</text>

  <rect x="320" y="90" width="120" height="120" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="380" cy="125" r="18" fill="#f59e0b"/>
  <text x="380" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">B</text>
  <text x="380" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">Budi S.</text>
  <rect x="355" y="165" width="50" height="18" fill="#dbeafe" rx="9"/>
  <circle cx="365" cy="174" r="3" fill="#3b82f6"/>
  <text x="380" y="177" font-family="Arial, sans-serif" font-size="10" fill="#1d4ed8" text-anchor="middle">Online</text>
  <text x="380" y="195" font-family="Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Just now</text>

  <rect x="460" y="90" width="120" height="120" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="520" cy="125" r="18" fill="#8b5cf6"/>
  <text x="520" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">L</text>
  <text x="520" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">Lisa M.</text>
  <rect x="495" y="165" width="50" height="18" fill="#dbeafe" rx="9"/>
  <circle cx="505" cy="174" r="3" fill="#3b82f6"/>
  <text x="520" y="177" font-family="Arial, sans-serif" font-size="10" fill="#1d4ed8" text-anchor="middle">Online</text>
  <text x="520" y="195" font-family="Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">5m ago</text>

  <!-- Row 2 -->
  <rect x="40" y="230" width="120" height="120" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="100" cy="265" r="18" fill="#ef4444"/>
  <text x="100" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">D</text>
  <text x="100" y="295" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">Dian P.</text>
  <rect x="75" y="305" width="50" height="18" fill="#dbeafe" rx="9"/>
  <circle cx="85" cy="314" r="3" fill="#3b82f6"/>
  <text x="100" y="317" font-family="Arial, sans-serif" font-size="10" fill="#1d4ed8" text-anchor="middle">Online</text>
  <text x="100" y="335" font-family="Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">1m ago</text>

  <rect x="180" y="230" width="120" height="120" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="240" cy="265" r="18" fill="#06b6d4"/>
  <text x="240" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">R</text>
  <text x="240" y="295" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">Rudi H.</text>
  <rect x="215" y="305" width="50" height="18" fill="#dbeafe" rx="9"/>
  <circle cx="225" cy="314" r="3" fill="#3b82f6"/>
  <text x="240" y="317" font-family="Arial, sans-serif" font-size="10" fill="#1d4ed8" text-anchor="middle">Online</text>
  <text x="240" y="335" font-family="Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">3m ago</text>

  <rect x="320" y="230" width="120" height="120" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1" opacity="0.7"/>
  <circle cx="380" cy="265" r="18" fill="#64748b"/>
  <text x="380" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">M</text>
  <text x="380" y="295" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">Maya K.</text>
  <rect x="355" y="305" width="50" height="18" fill="#fecaca" rx="9"/>
  <circle cx="365" cy="314" r="3" fill="#ef4444"/>
  <text x="380" y="317" font-family="Arial, sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">Leaving</text>

  <rect x="460" y="230" width="120" height="120" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="520" cy="265" r="18" fill="#84cc16"/>
  <text x="520" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">T</text>
  <text x="520" y="295" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">Toni W.</text>
  <rect x="495" y="305" width="50" height="18" fill="#dbeafe" rx="9"/>
  <circle cx="505" cy="314" r="3" fill="#3b82f6"/>
  <text x="520" y="317" font-family="Arial, sans-serif" font-size="10" fill="#1d4ed8" text-anchor="middle">Online</text>
  <text x="520" y="335" font-family="Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Just now</text>

  <!-- Pagination -->
  <rect x="20" y="360" width="560" height="30" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="378" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Page 1 of 3</text>

  <rect x="480" y="365" width="30" height="20" fill="#3b82f6" rx="4"/>
  <text x="495" y="377" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">1</text>

  <rect x="515" y="365" width="30" height="20" fill="#f1f5f9" rx="4"/>
  <text x="530" y="377" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">2</text>

  <rect x="550" y="365" width="30" height="20" fill="#f1f5f9" rx="4"/>
  <text x="565" y="377" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">3</text>
</svg>